name: Bump & Publish to GitHub Packages

on:
  push:
    branches:
      - main

# Two-stage release flow so we never push directly to a protected `main`:
#   1. `release-pr`: when a `minor()/major()/patch()` commit lands on main,
#      open a release branch + PR with the version bump and CHANGELOG entry,
#      and enable auto-merge (squash). The PR satisfies the repo rule that
#      "changes must be made through a pull request".
#   2. `publish`: when the squashed release commit itself lands on main
#      (HEAD subject starts with `chore(release): v…`), tag, `pnpm publish`,
#      and create the GitHub Release. Tags are pushed to `refs/tags/*`,
#      which is not gated by the branch ruleset.

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      bump: ${{ steps.detect.outputs.bump }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect mode (release-pr | publish | none)
        id: detect
        run: |
          set -e
          HEAD_SUBJECT=$(git log -1 --pretty=%s)

          # Stage 2: the squashed release PR has landed on main → publish.
          if printf '%s' "$HEAD_SUBJECT" | grep -Eq '^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION=$(printf '%s' "$HEAD_SUBJECT" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "Detected release commit; will publish ${VERSION}."
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Stage 1: any releasable commits since last tag → open release PR.
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          SUBJECTS=$(git log $RANGE --no-merges --pretty=format:"%s")

          BUMP=""
          if printf '%s\n' "$SUBJECTS" | grep -Eq '^major\([^)]+\):'; then
            BUMP="major"
          elif printf '%s\n' "$SUBJECTS" | grep -Eq '^minor\([^)]+\):'; then
            BUMP="minor"
          elif printf '%s\n' "$SUBJECTS" | grep -Eq '^patch\([^)]+\):'; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No releasable commits since ${PREV_TAG:-<root>}; skipping."
            echo "mode=" >> "$GITHUB_OUTPUT"
          else
            echo "Releasable commits found; will open release PR (${BUMP})."
            echo "mode=release-pr" >> "$GITHUB_OUTPUT"
            echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          fi

  release-pr:
    needs: detect
    if: needs.detect.outputs.mode == 'release-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (verify before opening release PR)
        run: pnpm build

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ needs.detect.outputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          set -e
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          else
            NOTES=$(git log --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          fi

          if [ -z "$NOTES" ]; then
            NOTES="_No user-facing changes._"
          fi

          {
            printf '# Changelog\n\nAll notable changes to Malbec UI are documented here.\n\n'
            printf '## %s — %s\n\n%s\n\n' "$NEW_VERSION" "$DATE" "$NOTES"
            if [ -f CHANGELOG.md ]; then
              awk '/^## / {found=1} found' CHANGELOG.md
            fi
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

          # Write notes to a file so `gh pr create --body-file` survives any
          # backticks / quotes inside commit subjects.
          {
            printf '## Notes\n\n%s\n' "$NOTES"
          } > /tmp/release-notes.md

      - name: Open release PR with auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          BRANCH="release/${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${NEW_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): ${NEW_VERSION}" \
            --body-file /tmp/release-notes.md

          # Squash so the resulting commit subject keeps the `chore(release): vX.Y.Z`
          # prefix that the Stage 2 detection step looks for.
          gh pr merge "$BRANCH" --auto --squash --delete-branch

  publish:
    needs: detect
    if: needs.detect.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: https://npm.pkg.github.com
          scope: '@obel-arg'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Tag and push
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.version }}
          name: ${{ needs.detect.outputs.version }}
          generate_release_notes: true
