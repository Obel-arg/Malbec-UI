name: Bump & Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: https://npm.pkg.github.com
          scope: '@obel-arg'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          set -e
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          else
            NOTES=$(git log --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          fi

          if [ -z "$NOTES" ]; then
            NOTES="_No user-facing changes._"
          fi

          {
            printf '# Changelog\n\nAll notable changes to Malbec UI are documented here.\n\n'
            printf '## %s — %s\n\n%s\n\n' "$NEW_VERSION" "$DATE" "$NOTES"
            if [ -f CHANGELOG.md ]; then
              awk '/^## / {found=1} found' CHANGELOG.md
            fi
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit, tag and push
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          git push --follow-tags origin HEAD:${{ github.ref_name }}

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
