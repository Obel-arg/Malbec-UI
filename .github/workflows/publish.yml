name: Bump & Publish to GitHub Packages

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.detect.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect bump level since last tag
        id: detect
        run: |
          set -e
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          SUBJECTS=$(git log $RANGE --no-merges --pretty=format:"%s")

          BUMP=""
          if printf '%s\n' "$SUBJECTS" | grep -Eq '^major\([^)]+\):'; then
            BUMP="major"
          elif printf '%s\n' "$SUBJECTS" | grep -Eq '^minor\([^)]+\):'; then
            BUMP="minor"
          elif printf '%s\n' "$SUBJECTS" | grep -Eq '^patch\([^)]+\):'; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No releasable commits since ${PREV_TAG:-<root>}; skipping publish."
          else
            echo "Detected bump level: $BUMP"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect
    if: needs.detect.outputs.bump != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: https://npm.pkg.github.com
          scope: '@obel-arg'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ needs.detect.outputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          set -e
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          else
            NOTES=$(git log --no-merges \
              --pretty=format:"- %s" \
              --invert-grep \
              --grep='^chore(release)' \
              --grep='^Merge ')
          fi

          if [ -z "$NOTES" ]; then
            NOTES="_No user-facing changes._"
          fi

          {
            printf '# Changelog\n\nAll notable changes to Malbec UI are documented here.\n\n'
            printf '## %s — %s\n\n%s\n\n' "$NEW_VERSION" "$DATE" "$NOTES"
            if [ -f CHANGELOG.md ]; then
              awk '/^## / {found=1} found' CHANGELOG.md
            fi
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

          {
            echo "notes<<__EOF__"
            echo "$NOTES"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          git push --follow-tags origin HEAD:${{ github.ref_name }}

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          name: ${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
